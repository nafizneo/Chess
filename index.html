<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrandmasterJS - Mobile Optimized</title>
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>

<div id="app-container">
    <div id="board-outer">
        <div id="main-board" class="board"></div>
    </div>

    <div id="sidebar">
        <div class="panel stats-panel">
            <div id="game-status" class="status-badge">WHITE TO MOVE</div>
            <div class="eval-container">
                <div class="eval-bar"><div id="eval-fill"></div></div>
                <div id="eval-text">Eval: 0.0</div>
            </div>
        </div>

        <div class="panel history-panel">
            <div class="panel-label">MOVE HISTORY</div>
            <div id="history" class="move-history"></div>
        </div>

        <div class="panel controls">
            <button onclick="gameUI.undo()">UNDO</button>
            <button onclick="gameUI.reset()">RESET</button>
            <button id="ai-toggle" onclick="gameUI.toggleAI()">AI: ON</button>
            <select id="difficulty" onchange="gameUI.setDifficulty(this.value)">
                <option value="2">Casual (D2)</option>
                <option value="3" selected>Amateur (D3)</option>
                <option value="4">Expert (D4)</option>
            </select>
        </div>
    </div>
</div>

<script src="./app.js"></script>
</body>
</html>
